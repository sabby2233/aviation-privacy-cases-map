<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球航空数据保护执法案例地图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://d3js.org/topojson.v3.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <svg class="w-7 h-7 text-sky-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <h1 class="text-lg font-semibold tracking-wide">全球航空数据保护执法案例地图</h1>
    </div>
    <div class="text-xs text-gray-500">Aviation Data Protection Enforcement Map</div>
  </header>

  <!-- Main Content -->
  <div class="flex flex-1 overflow-hidden flex-col lg:flex-row">

    <!-- Map Area -->
    <div id="map-container" class="flex-1 relative bg-gray-950">
      <div id="map-loading" class="absolute inset-0 flex items-center justify-center text-gray-500">
        <span class="animate-pulse text-sm">Loading map data...</span>
      </div>
      <svg id="world-map" class="w-full h-full"></svg>
      <!-- Tooltip -->
      <div id="tooltip" class="hidden absolute pointer-events-none bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm shadow-xl z-50">
        <div id="tooltip-country" class="font-semibold text-gray-100"></div>
        <div id="tooltip-count" class="text-sky-400 text-xs mt-1"></div>
      </div>
      <!-- Legend -->
      <div id="legend" class="absolute bottom-4 left-4 bg-gray-900/90 backdrop-blur border border-gray-800 rounded-lg px-4 py-3 text-xs">
        <div class="font-semibold text-gray-300 mb-2">案例数量</div>
        <div id="legend-items" class="flex flex-col gap-1"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-full lg:w-96 bg-gray-900 border-t lg:border-t-0 lg:border-l border-gray-800 overflow-y-auto shrink-0">
      <!-- Global Overview (default) -->
      <div id="sidebar-global" class="p-5">
        <h2 class="text-base font-semibold text-gray-200 mb-4 flex items-center gap-2">
          <svg class="w-4 h-4 text-sky-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
          全球统计概览
        </h2>
        <div id="global-stats" class="space-y-3">
          <!-- Filled by JS -->
        </div>
        <div class="mt-5 pt-4 border-t border-gray-800">
          <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">各国案例分布</h3>
          <div id="country-list" class="space-y-1 max-h-80 overflow-y-auto">
            <!-- Filled by JS -->
          </div>
        </div>
      </div>
      <!-- Country Detail (hidden by default) -->
      <div id="sidebar-country" class="hidden p-5">
        <button id="back-to-global" class="flex items-center gap-1 text-xs text-sky-400 hover:text-sky-300 mb-4">
          <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7"/></svg>
          返回全球概览
        </button>
        <div id="country-header" class="mb-4">
          <!-- Filled by JS -->
        </div>
        <div id="country-detail" class="space-y-4">
          <!-- Filled by JS -->
        </div>
      </div>
    </aside>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-900 border-t border-gray-800 px-6 py-2 text-center text-xs text-gray-600 shrink-0">
    Data sources: GDPR Enforcement Tracker &middot; CNIL &middot; ICO &middot; AEPD &middot; FTC &middot; CourtListener &middot; and more &mdash; Last updated: <span id="last-updated">-</span>
  </footer>

  <!-- Scripts -->
  <script src="js/data-loader.js"></script>
  <script src="js/map.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
